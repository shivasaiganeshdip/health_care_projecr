<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heart Disease Prediction</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
}

.container{
    width:600px;
    margin:auto;
    background:white;
    padding:40px;
}

h1{
    color:#1d4ed8;
    text-align:center;
    margin-bottom:30px;
}

label{
    display:block;
    font-weight:bold;
    margin-top:15px;
    margin-bottom:5px;
    font-size:18px;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:4px;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    margin-top:25px;
    background:blue;
    color:white;
    border:none;
    font-size:18px;
    cursor:pointer;
}

#result{
    margin-top:20px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>Heart Disease Prediction</h1>

<label>Age</label>
<input type="number" value="63">

<label>Sex (1=Male,0=Female)</label>
<input type="number" value="1">

<label>Chest Pain Type</label>
<input type="number" value="3">

<label>Resting Blood Pressure</label>
<input type="number" value="145">

<label>Cholesterol</label>
<input type="number" value="233">

<label>Fasting Blood Sugar</label>
<input type="number" value="1">

<label>Rest ECG</label>
<input type="number" value="0">

<label>Maximum Heart Rate</label>
<input type="number" value="150">

<label>Exercise Induced Angina</label>
<input type="number" value="0">

<label>Oldpeak</label>
<input type="number" value="2">

<label>Slope</label>
<input type="number" value="3">

<label>CA</label>
<input type="number" value="1">

<label>Thal</label>
<input type="number" value="1">

<button>Predict</button>

<div id="result"></div>

</div>

</body>
</html>
